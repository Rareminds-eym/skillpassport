name = "shared-email-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespaces for hourly/daily rate limiting (soft limits)
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "c45ac18997334201a93ff4b7605bd877"
preview_id = "afb5bd3fed6244a29f63a9a63a1370d1"

# Rate limiting binding — per-minute atomic limit (GA syntax, requires Wrangler >= 4.36.0)
# namespace_id must be a unique integer within your Cloudflare account.
# Each environment uses a different namespace_id to keep counters isolated.
[[ratelimits]]
name = "RATE_LIMITER_MINUTE"
namespace_id = "10010"
simple = { limit = 60, period = 60 }

# Development environment
[env.development]
name = "shared-email-api-dev"
vars = { ENVIRONMENT = "development", AWS_REGION = "ap-south-1" }

# Bindings are NOT inheritable — must be declared per named environment
[[env.development.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "c45ac18997334201a93ff4b7605bd877"
preview_id = "afb5bd3fed6244a29f63a9a63a1370d1"

[[env.development.ratelimits]]
name = "RATE_LIMITER_MINUTE"
namespace_id = "10010"
simple = { limit = 60, period = 60 }

# Staging environment
[env.staging]
name = "shared-email-api-staging"
vars = { ENVIRONMENT = "staging", AWS_REGION = "ap-south-1" }

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "c45ac18997334201a93ff4b7605bd877"
preview_id = "afb5bd3fed6244a29f63a9a63a1370d1"

[[env.staging.ratelimits]]
name = "RATE_LIMITER_MINUTE"
namespace_id = "10020"
simple = { limit = 60, period = 60 }

# Production environment
[env.production]
name = "shared-email-api-production"
vars = { ENVIRONMENT = "production", AWS_REGION = "ap-south-1" }

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "c45ac18997334201a93ff4b7605bd877"

[[env.production.ratelimits]]
name = "RATE_LIMITER_MINUTE"
namespace_id = "10030"
simple = { limit = 60, period = 60 }

# Observability
[observability]
enabled = true
