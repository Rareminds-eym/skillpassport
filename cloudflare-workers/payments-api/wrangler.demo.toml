name = "demo-payments-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = "ad91abcd16cd9e9c569d83d9ef46e398"

[dev]
port = 9003
inspector_port = 9233

[vars]
ENVIRONMENT = "demo"
EMAIL_API_URL = "https://demo-email-api.dark-mode-d021.workers.dev"
STORAGE_API_URL = "https://demo-storage-api.dark-mode-d021.workers.dev"

# Service binding to email-api worker
[[services]]
binding = "EMAIL_SERVICE"
service = "demo-email-api"

# Service binding to storage-api worker (for worker-to-worker communication)
# [[services]]
# binding = "STORAGE_SERVICE"
# service = "storage-api"

# =============================================================================
# REQUIRED SECRETS - Set via Cloudflare Dashboard or wrangler CLI
# =============================================================================
# Run these commands to set secrets:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put RAZORPAY_KEY_ID
#   wrangler secret put RAZORPAY_KEY_SECRET
#
# Optional secrets:
#   wrangler secret put RAZORPAY_WEBHOOK_SECRET
#   wrangler secret put RAZORPAY_MODE          # Set to 'test' for test mode
#   wrangler secret put RAZORPAY_KEY_ID_TEST   # Test mode key ID
#   wrangler secret put RAZORPAY_KEY_SECRET_TEST  # Test mode key secret
#
# For local development, copy .dev.vars.example to .dev.vars
# =============================================================================
