name = "razorpay-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Production (default deployment)
# IMPORTANT: Secrets are set via CLI (see below)
# RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, SHARED_API_KEY are all secrets
[vars]
ENVIRONMENT = "production"

# Test environment (for testing deployments)
[env.test]
vars = { ENVIRONMENT = "development" }
