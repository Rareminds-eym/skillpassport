name = "razorpay-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# ─── Local ────────────────────────────────────────────────────────────────────
# wrangler dev --port=9003
# Uses .dev.vars automatically (never deployed)
[vars]
ENVIRONMENT = "local"
RAZORPAY_MODE = "test"

[triggers]
crons = ["0 * * * *"]

# ─── Development ──────────────────────────────────────────────────────────────
# wrangler deploy --env development
# wrangler dev --env development --port=9003
[env.development]
name = "razorpay-api-development"

[env.development.vars]
ENVIRONMENT = "development"
RAZORPAY_MODE = "test"

[env.development.triggers]
crons = ["0 * * * *"]

# ─── Staging ──────────────────────────────────────────────────────────────────
# wrangler deploy --env staging
[env.staging]
name = "razorpay-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
RAZORPAY_MODE = "test"

[env.staging.triggers]
crons = ["0 * * * *"]

# ─── Production ───────────────────────────────────────────────────────────────
# wrangler deploy --env production
[env.production]
name = "razorpay-api-production"

[env.production.vars]
ENVIRONMENT = "production"
RAZORPAY_MODE = "live"

[env.production.triggers]
crons = ["0 * * * *"]
