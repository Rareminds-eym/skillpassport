# ============================================================================
# EXAMPLES
# ============================================================================
# Good and bad patterns specific to THIS codebase

examples:
  good:
    - description: "Correct Supabase query with user filter and error check"
      code: |
        const { data, error } = await supabase
          .from('assessments')
          .select('id, title, score, completed_at')
          .eq('learner_id', user.id)
          .order('completed_at', { ascending: false })
          .range(0, 19);

        if (error) throw new Error(`Failed to fetch assessments: ${error.message}`);
        return data;

    - description: "Correct React Query usage with query key factory"
      code: |
        const { data, isLoading, isError } = useQuery({
          queryKey: queryKeys.learner.assessments.list(userId),
          queryFn: () => fetchStudentAssessments(userId),
          staleTime: 2 * 60 * 1000,
          enabled: !!userId,
        });

        if (isLoading) return <Spinner />;
        if (isError) return <ErrorMessage message="Failed to load assessments" />;
        return <AssessmentList data={data} />;

    - description: "Correct Supabase Realtime cleanup"
      code: |
        useEffect(() => {
          const channel = supabase
            .channel('notifications')
            .on('postgres_changes', { event: 'INSERT', table: 'notifications' }, handler)
            .subscribe();

          return () => {
            supabase.removeChannel(channel);
          };
        }, [user.id]);

    - description: "Correct Cloudflare Pages Function webhook verification"
      code: |
        const signature = request.headers.get('x-razorpay-signature');
        const isValid = verifyWebhookSignature(body, signature, WEBHOOK_SECRET);
        if (!isValid) {
          return new Response(JSON.stringify({ error: 'Invalid signature' }), { status: 401 });
        }

    - description: "Correct Auth Store consumption using @rareminds-eym/auth-client"
      code: |
        import { useAuthStore } from '@rareminds-eym/auth-client';

        export function ProfileButton() {
          const user = useAuthStore(state => state.user);
          const logout = useAuthStore(state => state.logout);
          // ...
        }

    - description: "Correct database migration with schema changes only (DDL)"
      code: |
        -- Migration: Add description to assessments
        -- Phase: 1 of 3 (Expand)
        -- Breaking: No
        ALTER TABLE assessments ADD COLUMN description TEXT;

    - description: "Correct Zod validation with validateBody helper"
      code: |
        import { validateBody, CreateOrderSchema } from '../../lib/validation';
        import { apiSuccess, apiError } from '../../lib/response';

        const body = await request.json();
        const result = validateBody(CreateOrderSchema, body, request);
        if (!result.success) return result.response;  // 400 with field-level errors

        const { plan_id, billing_cycle } = result.data;
        // ... proceed with validated data

    - description: "Correct non-blocking email via service binding"
      code: |
        import { sendEmailSafe } from '../../lib/email-service';

        // Non-critical email — logs but never throws
        ctx.waitUntil(sendEmailSafe(env, {
          to: user.email,
          subject: 'Welcome to SkillPassport',
          html: welcomeHtml,
        }));

        return apiSuccess({ userId: user.id }, request);

    - description: "Correct structured error response using apiError"
      code: |
        import { apiError, apiDbError } from '../../lib/response';

        // Business logic error
        return apiError(400, 'VALIDATION_ERROR', 'Invalid email format', request);

        // Supabase DB error (auto-maps Postgres codes to safe messages)
        if (error) return apiDbError(error, request, { startTime });

    - description: "Correct SSO Service Binding RPC call"
      code: |
        import { ssoGetUserSubscription } from '../../lib/sso-client';

        const { subscription, plan } = await ssoGetUserSubscription(env, userId);
        if (!subscription) return apiError(404, 'NOT_FOUND', 'No active subscription', request);

  bad:
    - description: "Raw fetch inside a component (violates data-fetching rule)"
      code: |
        // WRONG: fetch inside component, no error handling, no caching
        useEffect(() => {
          fetch('/api/learner/data')
            .then(r => r.json())
            .then(setData);
        }, []);

    - description: "Cross-feature FSD violation"
      code: |
        // WRONG: features importing from sibling features
        import { useStudentProfile } from '@/features/learner/hooks/useStudentProfile';
        // inside src/features/auth/ — this breaks FSD boundaries

    - description: "Insecure auth token in localStorage"
      code: |
        // WRONG: never store session tokens in plain localStorage
        localStorage.setItem('session_token', session.access_token);
        localStorage.setItem('user_role', user.role);

    - description: "Missing error check on Supabase query"
      code: |
        // WRONG: ignoring the error property
        const { data } = await supabase.from('learners').select('*');
        setStudents(data); // data is null when there's an RLS error

    - description: "Ad-hoc query key (breaks cache invalidation)"
      code: |
        // WRONG: string array instead of queryKeys factory
        useQuery({
          queryKey: ['learner', 'messages', conversationId],
          queryFn: ...
        });

    - description: "Direct Supabase Auth usage in frontend (violates security standard)"
      code: |
        // WRONG: Direct Supabase auth functions must not be used on frontend
        await supabase.auth.signInWithPassword({ email, password });

    - description: "DML inside a Supabase migration file (violates DDL only standard)"
      code: |
        -- WRONG: INSERT/UPDATE/DELETE should not be in migrations
        INSERT INTO lookup_roles (name) VALUES ('educator');

    - description: "Importing backend Pages Functions code inside frontend src/ (violates layer separation)"
      code: |
        // WRONG: importing backend code in frontend
        import { verifyToken } from '../../functions/lib/auth';

    - description: "Plaintext token stored in database (violates token security)"
      code: |
        // WRONG: storing raw token without hashing
        await db.insert('sessions', { token: rawRefreshToken });

    - description: "await sendEmail in hot path (blocks response)"
      code: |
        // WRONG: awaiting email blocks the HTTP response
        await sendEmail(env, { to: email, subject: 'Welcome' });
        return apiSuccess({ ok: true }, request);

    - description: "CORS wildcard in production"
      code: |
        // WRONG: allows any origin
        headers.set('Access-Control-Allow-Origin', '*');

    - description: "Per-handler CORS headers (duplicates middleware)"
      code: |
        // WRONG: _middleware.ts already handles CORS for all responses
        const headers = getCorsHeaders(origin);
        return new Response(JSON.stringify(data), { headers });

    - description: "Raw Response.json instead of apiSuccess/apiError"
      code: |
        // WRONG: bypasses standard envelope and X-Request-ID
        return Response.json({ data: result });
        // Should use: return apiSuccess(result, request);

    - description: "Manual if/else validation instead of Zod"
      code: |
        // WRONG: manual validation misses edge cases
        if (!body.plan_id || typeof body.plan_id !== 'string') {
          return Response.json({ error: 'plan_id required' }, { status: 400 });
        }

    - description: "Direct HTTP call to sso-worker instead of binding RPC"
      code: |
        // WRONG: bypasses service binding trust boundary
        const res = await fetch('https://sso-api.example.com/api/subscription', {
          headers: { Authorization: `Bearer ${token}` },
        });

    - description: "Unsanitized user input stored directly"
      code: |
        // WRONG: user input not sanitized before storage
        await supabase.from('profiles').update({ bio: body.bio });
        // Should use: sanitizeInput(body.bio)

# ============================================================================
# NOTES FOR AI REVIEWER
# ============================================================================

notes: |
  This is a React 18 SPA — NOT Next.js. There is no App Router, no server
  components, and no SSR. Do not flag missing 'use client' directives.

  Routing is React Router DOM v7. Protected routes are in AppRoutes.jsx
  and enforce role-based access through authStore.

  Backend is Cloudflare Pages Functions only (/functions/api/*).
  There are no separate Cloudflare Workers. All serverless logic lives under /functions/.
  However, the wider ecosystem includes sso-worker, email-worker, auth-client,
  and auth-core packages — see CODE_REVIEW_GUIDELINES.md for cross-package rules.

  Key integrations:
  - sso-worker → email-worker via Cloudflare Service Binding (EMAIL_SERVICE)
  - sso-worker → Supabase via PostgREST (service-role key)
  - auth-client → sso-worker via HTTP (cookie-based auth)
  - auth-core → sso-worker JWKS endpoint for JWT verification

  Strict Frontend-Backend Layer Separation: Frontend code in /src/ MUST NOT import
  backend code in /functions/ or /worker/ (and vice versa). All cross-boundary interaction
  must go through API endpoints via apiClient or ssoClient.

  Supabase is the primary data store. All tables have Row Level Security (RLS).
  Queries without user filters may silently return empty (not an error) if RLS
  blocks access — this is a common source of hard-to-debug bugs.

  Do NOT use direct Supabase authentication (supabase.auth.*) on the frontend.
  Use @rareminds-eym/auth-client for all client-side authentication and
  @rareminds-eym/auth-core (withAuth middleware) on the backend.

  Auth architecture: Token lifecycle (hashing, cookies, JWT signing) is managed
  entirely by sso-worker. Skillpassport uses @rareminds-eym/auth-core (withAuth
  middleware) for JWT verification via Service Binding RPC to SSO_SERVICE.
  The auth-core is initialized once per isolate (lazy singleton pattern in
  functions/lib/auth.ts). Skillpassport does NOT directly create, store, or
  manage auth tokens or cookies.

  Auth initialization: auth-core's initAuth() is called once per isolate via
  ensureAuthInitialized(). Calling it per-request would clear the JWKS cache
  and force re-fetches. Do not call initAuth() outside of functions/lib/auth.ts.

  Email verification gate: withAuth() enforces email verification by default.
  Use withAuthAllowUnverified() only for endpoints that must work before email
  verification (e.g. creating a profile right after signup).

  Email sending: Uses email-worker via EMAIL_SERVICE binding. Use sendEmailSafe()
  for non-critical emails (logs but never throws). sendEmail() throws on binding
  misconfiguration. Email-worker handles its own rate limiting and HTML escaping.

  Response envelope: ALL Pages Function responses must use the apiSuccess/apiError
  helpers from functions/lib/response.ts. Never use raw Response.json() for API
  endpoints. The helpers enforce: { success, data, error, meta: { requestId,
  timestamp, durationMs } } with X-Request-ID header and CORS.

  Input validation: Use Zod schemas + validateBody() from functions/lib/validation.ts.
  Use sanitizeInput() for free-text fields. Use validateRequestSize() for body
  size limits. Use isValidEmail() and isValidUUID() for format checks.

  Shadow tables: Tables like users_shadow, roles, and subscription_cache are
  read-only mirrors of the sso-worker source of truth, managed via sync-shadow.ts.
  They exist for referential integrity only. NEVER use them as an authorization
  source. Always rely on the verified JWT provided by withAuth for access decisions.

  Realtime: Direct connections to Supabase Realtime from the frontend are prohibited.
  All realtime WebSocket connections must be proxied through the realtime-worker
  to manage connection limits and enforce security policies.

  AI features use both OpenAI and Google Generative AI. These API keys are
  VITE_-prefixed, meaning they are exposed in the browser bundle. Flag any
  new sensitive key that follows this pattern.

  Payment processing uses Razorpay via a Cloudflare Pages Function.
  The function must verify webhook HMAC signatures on every incoming event.

  Anti-cheating logic in /src/features/assessment/ is security-sensitive.
  Any change to useAntiCheating.ts or related hooks should receive full review.

  FSD export policy: Named exports preferred. No export default except Worker entry points.
  Use 'npm run build:dev' to catch import/export errors — NOT 'npm run dev'.

  _middleware.ts: Handles CORS globally for all responses. Also implements an
  edge-level auth guard that redirects authenticated users away from guest routes
  (login, signup) to their role-appropriate dashboard using EDGE_ROLE_DASHBOARD_MAP.
  This map MUST stay in sync with the frontend's roleBasedRouter.ts.
  WebSocket upgrade responses (101) are passed through without modification.

  Environment files: .env.local (dev), .env.development, .env.staging, .env.production
  Run `npm run env:validate` before flagging "missing env var" issues.

  Logger: Use createLogger(category) or pre-configured apiLogger/emailLogger/authLogger
  from functions/lib/logger.ts. These wrap console.* methods (which IS the production
  logging mechanism on CF Workers). This is NOT debugging code — do not flag it.

  LTE schema: All new tables must use lte. schema prefix. All enum types must use
  lte_ prefix. Include created_at and updated_at columns with defaults.
  Add indexes for foreign keys and common filter columns.

