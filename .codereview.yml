# ============================================================================
# FOCUS AREAS
# ============================================================================
# Paths that demand highest review scrutiny

focus:
  - path: "src/shared/model/authStore.ts"
    reason: "Global auth state — session management, role resolution, secure storage"
    severity: critical

  - path: "src/features/auth/api/**"
    reason: "Authentication logic — signup, login, session refresh, error handling"
    severity: critical

  - path: "functions/api/payment/**"
    reason: "Razorpay webhook handling and payment verification"
    severity: critical

  - path: "functions/api/user/**"
    reason: "User signup and profile mutation endpoints"
    severity: critical

  - path: "functions/_middleware.ts"
    reason: "Global CORS and request validation for all Functions"
    severity: critical

  - path: "src/app/routes/AppRoutes.jsx"
    reason: "Role-based routing — any gap exposes protected pages"
    severity: high

  - path: "src/features/assessment/**"
    reason: "Contains anti-cheating logic (useAntiCheating) — integrity critical"
    severity: high

  - path: "src/features/analytics/**"
    reason: "Aggregates sensitive learner and organization data"
    severity: high

  - path: "src/entities/subscription/**"
    reason: "Entitlement checks gate feature access — errors expose premium features"
    severity: high

  - path: "functions/lib/auth.ts"
    reason: "Auth initialization, withAuth wrapper, requireAdmin, requireFeatureAccess guards"
    severity: critical

  - path: "functions/lib/sso-client.ts"
    reason: "Service Binding RPC client for SSO — subscription, membership, role operations"
    severity: critical

  - path: "functions/lib/cors.ts"
    reason: "CORS origin allowlist — misconfiguration exposes API to unauthorized origins"
    severity: critical

  - path: "functions/lib/response.ts"
    reason: "Response envelope helpers — ensures no internal DB details leak"
    severity: high

  - path: "functions/lib/validation.ts"
    reason: "Zod schemas and input sanitization — first line of defense against injection"
    severity: high

  - path: "functions/api/email/**"
    reason: "Email sending via service binding — must use sendEmailSafe for non-critical"
    severity: high

  - path: "functions/api/storage/**"
    reason: "File upload handling — file size limits and storage access control"
    severity: high

  - path: "functions/lib/entitlements.ts"
    reason: "Server-side feature gating — fails-closed design, must not silently grant"
    severity: critical

  - path: "functions/api/career/**"
    reason: "Sends learner data to AI/vector services — data privacy boundary"
    severity: high

# ============================================================================
# REVIEW PREFERENCES
# ============================================================================

preferences:
  verbosity: normal
  include_suggestions: true
  include_examples: true
  max_findings_per_file: 12
  min_severity: low

# ============================================================================
# TEAM STANDARDS
# ============================================================================

standards:
  naming:
    - "PascalCase for React components and TypeScript interfaces/types"
    - "camelCase for variables, functions, and object properties"
    - "UPPER_SNAKE_CASE for true constants (not config objects)"
    - "use* prefix for all custom hooks"
    - "*Service suffix for API service files"
    - "*Store suffix for Zustand store files"
    - "is*/has*/should* prefix for boolean variables and props"
    - "Query key factories follow queryKeys.domain.method() pattern"

  organization:
    - "Imports order: external libs → @/ internal → relative → types"
    - "FSD layer order in each module: api → model → ui → lib → index"
    - "One component per file (exception: small co-located helpers)"
    - "Feature index.ts must re-export only the public API of the feature"
    - "Supabase table queries belong in entity /api/ files, not in components"
    - "Named exports only — no export default except Worker entry points"
    - "Backend files use kebab-case.ts (e.g. password-reset.ts, rate-limit.ts)"
    - "DB columns use snake_case, DB tables use snake_case plural (audit_logs)"
    - "Use 'interface' for object shapes, 'type' for unions/intersections"

  error_handling:
    - "All async functions must have try-catch or return error objects"
    - "Log errors with correlation context: userId, requestId, action name"
    - "Never swallow errors silently — always surface to error boundary or toast"
    - "Supabase query errors must check 'error' property, not just 'data'"
    - "Use apiSuccess/apiError/apiDbError/apiValidationError helpers from functions/lib/response.ts"
    - "Envelope: { success, data, error: { code, message }, meta: { requestId, timestamp, durationMs } }"
    - "Auth errors go through authErrorHandler.ts, not raw console.error"
    - "Internal errors return generic 500 messages — no stack traces or DB details to clients"
    - "DB errors mapped via SAFE_ERROR_MAP — never expose raw Postgres error codes to clients"
    - "Non-blocking operations (audit, email) use ctx.waitUntil() or sendEmailSafe()"

  testing:
    - "Vitest is the test runner — do not add Jest test files in src/"
    - "Test files live in __tests__/ directory adjacent to the tested module"
    - "Test names follow: 'should <outcome> when <condition>'"
    - "Auth tests must cover: success, wrong password, expired session, network error"
    - "Mock Supabase in unit tests; hit real Supabase in integration tests"

  accessibility:
    - "All interactive elements must have accessible labels (aria-label or visible text)"
    - "Images must have meaningful alt text (not empty unless decorative)"
    - "Forms must associate labels with inputs via htmlFor/id"
    - "Keyboard navigation must work for all dialogs and dropdowns (Radix handles this)"
    - "Color contrast must meet WCAG 2.1 AA minimum"

  realtime:
    - "All realtime connections MUST be proxied through realtime-worker — no direct Supabase connections"
    - "Every useEffect that opens a Supabase channel must return cleanup that unsubscribes"
    - "Presence hooks must handle the case where user goes offline mid-session"
    - "Never open more than one channel per feature per component mount"

  security:
    - "Auth tokens/cookies managed by sso-worker — skillpassport must not set auth cookies"
    - "If adding token storage, SHA-256 hash before DB — never store plaintext"
    - "CORS handled globally by _middleware.ts via ALLOWED_ORIGINS — no per-handler CORS"
    - "CSRF: POST/PUT/PATCH/DELETE must pass Origin check (via CORS middleware)"
    - "Redirect validation: relative paths only, no protocol-relative, no loop to guest routes"
    - "User input sanitized via sanitizeInput() — strips HTML tags, control chars, enforces max length"
    - "Request body size validated via validateRequestSize(request, maxBytes)"
    - "Input validated via Zod schemas + validateBody() — never manual if/else chains"
    - "Email via sendEmailSafe() for non-critical, sendEmail() when result needed"
    - "Service Binding RPC for all cross-service calls (sso-client.ts, email-service.ts)"

  observability:
    - "X-Request-ID header on every response"
    - "Structured JSON logging: timestamp, level, message, requestId, userId, service, environment"
    - "Audit log entries for all auth actions (login, logout, signup, password reset, role change)"
    - "Never log: passwords, tokens, API keys, credit cards, SSNs, PII"

  performance:
    - "API targets: p50 < 100ms, p95 < 500ms, p99 < 1000ms"
    - "DB queries: Simple < 10ms, Complex < 100ms, AbortController timeout 10s"
    - "Frontend: FCP < 1.8s, LCP < 2.5s, TTI < 3.8s, CLS < 0.1"
    - "Rate limiting on all sensitive endpoints (per-IP + per-account lockout)"
    - "Pagination: default 50 items, max 1000 for all list endpoints"

