# Wrangler configuration for Cloudflare Pages Functions
# This is used for local development with `wrangler pages dev`

name = "skill-passport-portal"
compatibility_date = "2025-05-09"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# KV NAMESPACES
# ============================================================================
# Cache KV namespace for subscription and feature access caching
[[kv_namespaces]]
binding = "CACHE_KV"
id = "YOUR_KV_NAMESPACE_ID"  # Replace with actual KV namespace ID from Cloudflare dashboard
preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"  # Replace with preview KV namespace ID

# ============================================================================
# SERVICE BINDINGS
# ============================================================================
# Payment worker — called via RPC (WorkerEntrypoint), zero-latency, no JWT needed.
# Local dev: npx wrangler pages dev ./dist --service PAYMENT_WORKER=razorpay-api

[[services]]
binding = "PAYMENT_WORKER"
service = "razorpay-api"
entrypoint = "PaymentService"

# SSO worker — authentication service, zero-latency internal routing
# HTTP-style binding (no entrypoint) for JWKS fetching and token refresh
[[services]]
binding = "SSO_SERVICE"
service = "sso-api"
# No entrypoint needed - sso-api uses default fetch handler

# Environment variables for local development
# These will be loaded from .dev.vars file