# Wrangler configuration for Cloudflare Pages Functions
# This is used for local development with `wrangler pages dev`

name = "skill-passport-portal"
compatibility_date = "2026-05-25"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# KV NAMESPACES - REMOVED
# ============================================================================
# KV namespaces removed to eliminate external dependencies
# Rate limiting and caching now rely on database-level constraints

# ============================================================================
# SERVICE BINDINGS
# ============================================================================
# Payment worker — called via RPC (WorkerEntrypoint), zero-latency, no JWT needed.
# Local dev: npx wrangler pages dev ./dist --service PAYMENT_WORKER=razorpay-api

[[services]]
binding = "PAYMENT_WORKER"
service = "razorpay-api"
entrypoint = "PaymentService"

# SSO worker — authentication service, zero-latency internal routing
# RPC-style binding (WorkerEntrypoint) for typed method calls
[[services]]
binding = "SSO_SERVICE"
service = "sso-api"
entrypoint = "SsoWorker"

# Email worker — centralized email service, zero-latency internal routing
# RPC-style binding (WorkerEntrypoint) for typed method calls
[[services]]
binding = "EMAIL_SERVICE"
service = "shared-email-api"
entrypoint = "EmailService"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
# Variables are categorized into:
# 1. Client Variables (VITE_*) - Exposed to frontend via Vite build
# 2. Pages Function Variables - Used by backend (functions/api/**)
# 3. Secrets - Sensitive values (use .dev.vars locally, wrangler secret in production)

[vars]
# ──────────────────────────────────────────────────────────────────────────
# NON-SECRET CONFIGURATION 
# ──────────────────────────────────────────────────────────────────────────

# SSO / Auth Configuration (Pages Functions)
SSO_DOMAIN = "https://sso-api.dark-mode-d021.workers.dev/"

# Supabase Configuration (Pages Functions)
SUPABASE_URL = "https://dpooleduinyyzxgrcwko.supabase.co"

# API URLs (Pages Functions)
EMAIL_API_URL = "https://shared-email-api.dark-mode-d021.workers.dev"
EMBEDDING_API_URL = "https://embedding-api.dark-mode-d021.workers.dev"
PAYMENTS_API_URL = "https://razorpay-api.dark-mode-d021.workers.dev/"



# Cloudflare R2 Configuration (Pages Functions)
CLOUDFLARE_R2_BUCKET_NAME = "skill-echosystem"


# ── Zoho ──────────────────────────────────────────────────────────────
ZOHO_FLOW_WEBHOOK_URL="https://flow.zoho.in/60069206802/flow/webhook/"

# ──────────────────────────────────────────────────────────────────────────
# CLIENT VARIABLES (VITE_*) - Exposed to Frontend
# ──────────────────────────────────────────────────────────────────────────
# Note: These are injected into the Vite build and visible in browser.
# Only include non-sensitive configuration here.

# SSO / Auth (Frontend)
