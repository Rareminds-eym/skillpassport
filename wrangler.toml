VITE_EMAIL_API_URL = "https://shared-email-api.dark-mode-d021.workers.dev"
VITE_EMBEDDING_API_URL = "https://embedding-api.dark-mode-d021.workers.dev"
VITE_PAYMENTS_API_URL = "https://razorpay-api.dark-mode-d021.workers.dev/"

# Analytics 
VITE_GTM_ID = "GTM-M2N3952J"

# Note: Razorpay keys are managed by the payment worker and returned in API responses

# ──────────────────────────────────────────────────────────────────────────
# SECRETS (DO NOT COMMIT VALUES)
# ──────────────────────────────────────────────────────────────────────────
# For local development: Add these to .dev.vars file (gitignored)
# For production: Set using `wrangler secret put <KEY_NAME>`
#
# Required secrets:
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - VITE_SUPABASE_ANON_KEY
# - CLOUDFLARE_R2_ACCESS_KEY_ID
# - CLOUDFLARE_R2_SECRET_ACCESS_KEY
# - EMAIL_API_KEY
# - EMBEDDING_API_KEY
# - OPENROUTER_API_KEY (optional, for AI features)
# - CLAUDE_API_KEY (optional, for AI features)
# - GEMINI_API_KEY (optional, for AI features)
# - SIGNING_SECRET (optional, for media access tokens)
#
# Note: Razorpay keys are NOT needed here - they are managed by the payment worker


# ──────────────────────────────────────────────────────────────────────────
# VARIABLE USAGE GUIDE
# ──────────────────────────────────────────────────────────────────────────
#
# CLIENT VARIABLES (VITE_*):
# - Injected into frontend bundle during Vite build
# - Accessible via import.meta.env.VITE_* in React components
# - Visible in browser DevTools (never put secrets here!)
# - Examples: API endpoints, public keys, feature flags
#
# PAGES FUNCTION VARIABLES (no prefix):
# - Available to backend code in functions/api/**
# - Accessed via context.env.VARIABLE_NAME
# - NOT exposed to frontend
# - Examples: Database credentials, API keys, service URLs
#
# SECRETS (.dev.vars or wrangler secret):
# - Sensitive values that should never be committed
# - Local dev: Add to .dev.vars (gitignored)
# - Production: Use `wrangler secret put KEY_NAME`
# - Examples: API keys, passwords, tokens
#
# ──────────────────────────────────────────────────────────────────────────
