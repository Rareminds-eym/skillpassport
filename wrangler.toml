# Wrangler configuration for Cloudflare Pages Functions
# Production vars are configured in Cloudflare dashboard.
# For local dev: wrangler pages dev ./dist

name = "skill-passport-portal"
compatibility_date = "2026-05-25"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# SERVICE BINDINGS
# ============================================================================

[[services]]
binding = "PAYMENT_WORKER"
service = "razorpay-api"
entrypoint = "PaymentService"

[[services]]
binding = "SSO_SERVICE"
service = "sso-api"
entrypoint = "SsoWorker"

[[services]]
binding = "REALTIME_WORKER"
service = "realtime-worker"

[[services]]
binding = "EMBEDDING_SERVICE"
service = "embedding-worker"
entrypoint = "EmbeddingWorker"

[[queues.producers]]
binding = "REALTIME_EVENTS_QUEUE"
queue = "realtime-events-queue"

[[queues.producers]]
binding = "SSO_REVERSE_SYNC_QUEUE"
queue = "sso-reverse-sync-queue"

[[services]]
binding = "EMAIL_SERVICE"
service = "shared-email-api"
entrypoint = "EmailService"

# ============================================================================
# VARIABLES
# ============================================================================

[vars]
ENVIRONMENT = "production"

# ============================================================================
# SECRETS (DO NOT COMMIT VALUES)
# ============================================================================
# For local development: Add these to .dev.vars file (gitignored)
# For production: Set using `wrangler secret put <KEY_NAME>` or dashboard
#
# Required secrets:
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - CLOUDFLARE_R2_SECRET_ACCESS_KEY
# - EMAIL_API_KEY
# - SIGNING_SECRET (for media access tokens)
#
# Required plain vars (set via dashboard):
# - CLOUDFLARE_R2_ACCESS_KEY_ID
# - CLOUDFLARE_ACCOUNT_ID
#
# Optional secrets (set only if using the feature):
# - OPENROUTER_API_KEY (AI features)
# - CLAUDE_API_KEY (AI features)
# - DEEPGRAM_API_KEY (audio transcription)
# - GROQ_API_KEY (audio transcription, fallback)
# - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS (direct SMTP email)
# - ADMIN_EMAIL (admin notification recipient)
# - APP_URL (public app base URL for email links)
# - FROM_EMAIL, FROM_NAME (default sender identity)
